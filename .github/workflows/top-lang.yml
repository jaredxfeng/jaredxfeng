name: Update GitHub Readme Stats Cards

on:
  schedule:
    - cron: '0 3 * * Sun'     # Runs daily at 3 AM UTC
  workflow_dispatch:        # Allows manual trigger from the Actions tab

jobs:
  update-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Stats Card (with letter grade + private repos)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=dracula&count_private=true&show_icons=true
          path: stats.svg
          token: ${{ secrets.PAT }}

      - name: Generate Top Languages Card (private repos + dracula + hide HTML/Jupyter)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=dracula&layout=compact&langs_count=8&count_private=true&hide=html,jupyter%20notebook
          path: top-langs.svg
          token: ${{ secrets.PAT }}

      - name: Commit & Push updated SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "chore: update readme stats cards" || exit 0
          git push
